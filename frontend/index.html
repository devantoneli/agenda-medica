<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agenda Médica</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="login-card">
        
        <div class="left-side">
            <div class="logo">
                <img src="img/logo-agenda.png" alt="Agenda Médica">
            </div>
            <div class="illustration">
                <img src="img/ilustracao-login.png" alt="Ilustração de Calendário">
            </div>
        </div>

        <!-- LADO DIREITO -->
        <div class="right-side">
            <h2>Login</h2>
            
            <div id="mensagem-erro" class="mensagem-erro"></div>

            <form id="form-login">
                <div class="input-group">
                    <label>Usuário/email</label>
                    <input type="text" id="usuario" placeholder="Digite o usuário ou email" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="Digite a senha" required>
                </div>
                
                <a href="#" class="forgot-password">Esqueci a senha</a>
                
                <button type="submit" class="btn-entrar">Entrar</button>
            </form>

            <div class="support-text">
                Algum problema? Contate-nos<br>
                <a href="mailto:atendimento@timesaver.com.br">atendimento@timesaver.com.br</a>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
